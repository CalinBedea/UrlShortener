<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Calin's Portfolio</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: #2a2a2a;
            --border-color: #333;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 15px;
            margin-bottom: 1.2rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            color: white;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        input::placeholder {
            color: #777;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 1.5rem;
            word-break: break-all;
        }

        .error {
            color: var(--error-color);
            font-size: 14px;
            margin-bottom: 1rem;
            min-height: 20px;
        }

        .success-box {
            padding: 1rem;
            background: #1a2233;
            border-radius: 6px;
            border: 1px solid #2e3b55;
        }

        .success-box a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        .success-box a:hover {
            text-decoration: underline;
        }

        .footer-credit {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 12px;
            color: #666;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>URL Shortener</h2>
    <div id="errorMsg" class="error"></div>

    <input type="text" id="urlInput" placeholder="Enter your long URL here (https://...)">
    <button onclick="shortenUrl()">Shorten URL</button>

    <div id="result"></div>
</div>

<div class="footer-credit">
    Developed by Calin Bedea
</div>

<script>
    async function shortenUrl() {
        const input = document.getElementById('urlInput').value;
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('errorMsg');

        resultDiv.innerHTML = '';
        errorDiv.innerHTML = '';

        try {
            const response = await fetch('/api/url', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ originalUrl: input })
            });

            if (response.ok) {
                const shortUrl = await response.text();
                resultDiv.innerHTML = `
                    <div class="success-box">
                        <span style="font-size: 14px; color: #aaa;">Your short link:</span><br>
                        <a href="${shortUrl}" target="_blank">${shortUrl}</a>
                    </div>
                `;
            } else {
                const errorData = await response.json();
                errorDiv.innerText = errorData.originalUrl || "An unexpected error occurred.";
            }
        } catch (error) {
            errorDiv.innerText = "Server connection error.";
        }
    }
</script>

</body>
</html>
